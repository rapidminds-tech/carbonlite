<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
  <h2>Right-click each icon → "Save image as..." to save as PNG</h2>
  <p>Save them in the <code>icons/</code> folder with the filenames shown.</p>
  <div style="display:flex;gap:32px;align-items:end;margin:32px;">
    <div>
      <canvas id="c16" width="16" height="16"></canvas>
      <p><strong>icon-16.png</strong></p>
    </div>
    <div>
      <canvas id="c48" width="48" height="48"></canvas>
      <p><strong>icon-48.png</strong></p>
    </div>
    <div>
      <canvas id="c128" width="128" height="128"></canvas>
      <p><strong>icon-128.png</strong></p>
    </div>
  </div>
  <script>
    function drawIcon(canvas) {
      const s = canvas.width;
      const ctx = canvas.getContext("2d");
      const r = s * 0.1875; // corner radius

      // Background gradient
      const grad = ctx.createLinearGradient(0, 0, s, s);
      grad.addColorStop(0, "#22c55e");
      grad.addColorStop(1, "#166534");

      // Rounded rect
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(s - r, 0);
      ctx.quadraticCurveTo(s, 0, s, r);
      ctx.lineTo(s, s - r);
      ctx.quadraticCurveTo(s, s, s - r, s);
      ctx.lineTo(r, s);
      ctx.quadraticCurveTo(0, s, 0, s - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Leaf
      const cx = s * 0.5;
      const cy = s * 0.5;
      const scale = s / 128;

      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(scale, scale);

      // Main leaf shape
      ctx.beginPath();
      ctx.moveTo(-8, 28);
      ctx.bezierCurveTo(-8, 28, -30, -5, -10, -30);
      ctx.bezierCurveTo(5, -48, 30, -42, 30, -42);
      ctx.bezierCurveTo(30, -42, 35, -18, 20, 2);
      ctx.bezierCurveTo(8, 18, -8, 28, -8, 28);
      ctx.fillStyle = "rgba(255,255,255,0.95)";
      ctx.fill();

      // Stem
      ctx.beginPath();
      ctx.moveTo(-8, 28);
      ctx.bezierCurveTo(-12, 34, -18, 38, -18, 38);
      ctx.strokeStyle = "rgba(255,255,255,0.95)";
      ctx.lineWidth = 3;
      ctx.lineCap = "round";
      ctx.stroke();

      // Main vein
      ctx.beginPath();
      ctx.moveTo(-4, 22);
      ctx.bezierCurveTo(2, 10, 10, -5, 22, -32);
      ctx.strokeStyle = "rgba(22,101,52,0.4)";
      ctx.lineWidth = 2.5;
      ctx.stroke();

      ctx.restore();
    }

    drawIcon(document.getElementById("c16"));
    drawIcon(document.getElementById("c48"));
    drawIcon(document.getElementById("c128"));

    // Auto-download
    ["c16", "c48", "c128"].forEach(id => {
      const canvas = document.getElementById(id);
      const link = document.createElement("a");
      link.download = `icon-${canvas.width}.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
    });
  </script>
</body>
</html>
